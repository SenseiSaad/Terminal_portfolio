<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details // Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { mono: ['"Fira Code"', 'monospace'] },
                    colors: { term: { bg: '#000000', text: '#ffffff', dim: '#888888' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Fira Code', monospace; }
        
        .rich-text h1 { font-size: 2.5rem; font-weight: 800; margin: 2rem 0 1.5rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
        .rich-text h2 { font-size: 1.75rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #eee; }
        .rich-text p { margin-bottom: 1.5rem; line-height: 1.8; color: #ccc; }
        .rich-text ul { list-style-type: "- "; padding-left: 1.5rem; margin-bottom: 1.5rem; color: #ccc; }
        .rich-text li { margin-bottom: 0.5rem; }
        .rich-text a { color: #fff; text-decoration: underline; }
        .rich-text blockquote { border-left: 2px solid #555; padding-left: 1.5rem; color: #888; font-style: italic; margin-bottom: 1.5rem; }
        .rich-text img { max-width: 100%; border: 1px solid #222; margin: 2rem 0; }

        .term-button { border: 1px solid #fff; padding: 6px 16px; transition: all 0.2s; display: inline-block; cursor: pointer; text-transform: lowercase; font-size: 0.85rem; }
        .term-button:hover { background-color: #fff; color: #000; }
        
        .prompt::before { content: "saad@portfolio:~$ "; color: #888; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">

    <div class="max-w-4xl mx-auto space-y-12">
        <header class="flex justify-between items-center border-b border-zinc-800 pb-4">
            <a href="./index.html" class="hover:underline flex items-center gap-2 group">
                <i data-lucide="chevron-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                <span>./back</span>
            </a>
            <div class="text-[10px] uppercase tracking-widest text-dim">Payload Details // Node_01</div>
        </header>

        <main id="loading" class="animate-pulse py-12 text-dim">INITIALIZING DATA_STREAM...</main>

        <article id="content-container" style="display: none;" class="space-y-12">
            <header class="space-y-6">
                <div id="date-text" class="text-xs text-dim uppercase tracking-widest"></div>
                <h1 id="title" class="text-4xl md:text-6xl font-bold uppercase tracking-tight"></h1>
                <div id="tech-stack" class="flex flex-wrap gap-3 font-mono text-[10px] text-white"></div>
                <div id="links-container" class="flex flex-wrap gap-4 pt-4"></div>
            </header>
            <!-- Image logic removed by user request -->
            <div id="body-content" class="rich-text">
                <!-- Content -->
            </div>

            <footer class="pt-12 border-t border-zinc-900">
                <a href="./index.html" class="term-button">[ run back ]</a>
            </footer>
        </article>
    </div>

    <script>
        lucide.createIcons();
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const slug = params.get('slug');

        const mockData = {
            experience: {
                'm1': { title: 'Backend Engineer @ TechFlow Solutions', role: 'Backend Engineer', company: 'TechFlow Solutions', start_date: '2024', end_date: 'Present', description: 'Architected high-scale REST APIs using Django and PostgreSQL. Optimized query performance by 40%.', github_url: '#', live_url: '#' },
                'm2': { title: 'DevOps Intern @ CloudNet PK', role: 'DevOps Intern', company: 'CloudNet PK', start_date: '2023', end_date: '2024', description: 'Automated CI/CD pipelines using GitHub Actions and Docker. Managed AWS EC2 instances.' }
            },
            projects: {
                'nexus-archive': { title: 'Nexus Archive', description: 'A secure file-sharing platform with end-to-end encryption and AWS S3 integration.', tech_stack: ['Django', 'AWS S3', 'React'], github_url: '#', live_url: '#' },
                'taskflow': { title: 'TaskFlow API', description: 'Modular project management API with JWT authentication and role-based access control.', tech_stack: ['Python', 'DRF', 'Docker'], github_url: '#', live_url: '#' },
                'serverless-proxy': { title: 'Edge Proxy', description: 'High-performance edge proxy built with Nginx and Lua for request routing.', tech_stack: ['Nginx', 'Lua'] }
            },
            blogs: {
                'docker-optimization': { title: 'Docker for Backend', description: 'How to shrink your Docker images by 70% using multi-stage builds.' },
                'aws-iam-best-practices': { title: 'Securing AWS IAM', description: 'Deep dive into the principle of least privilege for cloud security.' }
            }
        };

        if(type && slug) {
            fetch(`https://api.slancer.site/api/${type}/${slug}/`)
                .then(res => res.ok ? res.json() : Promise.reject())
                .catch(() => {
                    if (mockData[type] && mockData[type][slug]) return mockData[type][slug];
                    throw new Error('NOT_FOUND');
                })
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content-container').style.display = 'block';
                    
                    document.getElementById('title').textContent = data.title || (data.role ? `${data.role} @ ${data.company}` : 'RECORD_NULL');
                    
                    let dateText = '';
                    if (data.created_at) dateText = `LOGGED: ${new Date(data.created_at).toLocaleDateString()}`;
                    else if (data.start_date) dateText = `ACTIVE: ${data.start_date} -> ${data.end_date || 'Present'}`;
                    document.getElementById('date-text').textContent = dateText;

                    let linksHtml = '';
                    if (data.github_url) linksHtml += `<a href="${data.github_url}" target="_blank" class="term-button text-[10px]">[ run repo ]</a>`;
                    if (data.live_url) linksHtml += `<a href="${data.live_url}" target="_blank" class="term-button text-[10px]">[ run live ]</a>`;
                    if (linksHtml) {
                        const lc = document.getElementById('links-container');
                        lc.innerHTML = linksHtml;
                    }
                    // Image logic removed
                    let tsArray = Array.isArray(data.tech_stack) ? data.tech_stack : [];
                    if (typeof data.tech_stack === 'string') { try { tsArray = JSON.parse(data.tech_stack); } catch(e) { tsArray = data.tech_stack.split(','); } }
                    if(tsArray.length > 0) {
                        document.getElementById('tech-stack').innerHTML = tsArray.map(t => `<span class="border border-zinc-800 px-2 py-1">[ #${t.trim()} ]</span>`).join(' ');
                    }

                    document.getElementById('body-content').innerHTML = data.content || data.description || 'NO_PAYLOAD_AVAILABLE';
                })
                .catch(() => {
                    document.getElementById('loading').innerHTML = "[!] ERR: RECORD_NOT_FOUND.";
                });
        } else {
            document.getElementById('loading').innerHTML = "[!] ERR: INVALID_PARAMS.";
        }
    </script>
</body>
</html>
